ISTIO_PRIVATE_GATEWAY_NAME: private-gateway
ISTIO_PUBLIC_GATEWAY_NAME: public-gateway
PUBLIC_FB_SERVICE_NAME: public-fallback-service
PRIVATE_FB_SERVICE_NAME: private-fallback-service
PUBLIC_SERVICE: "public-frontend-gateway"
PUBLIC_SERVICE_NAME: "public-gateway-service"
PRIVATE_SERVICE: "private-frontend-gateway"
PRIVATE_SERVICE_NAME: "private-gateway-service"
PRIVATE_GW_ROUTE_NAME: fallback-to-private-gateway
PUBLIC_GW_ROUTE_NAME: fallback-to-public-gateway

ISTIO_EGRESS_GATEWAY_NAME: egress-gateway
EGRESS_FB_SERVICE_NAME: egress-fallback-service 
EGRESS_GATEWAY_SERVICE_NAME: "egress-gateway"
EGRESS_GATEWAY_SERVICE: "egress-gateway-gateway"

WAYPOINT_NAME: waypoint

# contract parameters - do not change name
APPLICATION_NAME: "Cloud-Core"
SKIP_EGRESS_GATEWAY_CREATION: false
SERVICE_NAME: "qubership-core-mesh"
deploy_feature_flags:
  core:
    serviceMeshType: "CORE"  

CLOUD_TOPOLOGY_KEY: kubernetes.io/hostname
HPA_ENABLED: false
REPLICAS: 1
GATEWAY_PROFILE: dev  # or prod

gatewayProfiles:
  prod:
    cpuRequest: 500m
    cpuLimit: 2
    memRequest: 512Mi
    memLimit: 1Gi

  dev:
    cpuRequest: 200m
    cpuLimit: 1
    memRequest: 256Mi
    memLimit: 512Mi