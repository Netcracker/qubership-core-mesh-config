{{- if eq .Values.deploy_feature_flags.core.serviceMeshType "ISTIO" }}
---
kind: Service
apiVersion: v1
metadata:
  name: '{{ .Values.PUBLIC_SERVICE_NAME }}'
  annotations:
    helm.sh/hook: "post-install, post-upgrade"
    helm.sh/hook-weight: "110"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    {{- include "mesh.labels.service" (dict "root" . "name" .Values.PUBLIC_SERVICE_NAME ) | nindent 4 }}
spec:
  ports:
    - name: web
      protocol: TCP
      port: 8080
      targetPort: 8080
  selector:
    gateway.networking.k8s.io/gateway-name: '{{ .Values.ISTIO_PUBLIC_GATEWAY_NAME }}'
  clusterIP: None
  clusterIPs:
    - None
  type: ClusterIP
  sessionAffinity: None
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster 
---
kind: Service
apiVersion: v1
metadata:
  name: '{{ .Values.PRIVATE_SERVICE_NAME }}'
  annotations:
    helm.sh/hook: "post-install, post-upgrade"
    helm.sh/hook-weight: "110"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    {{- include "mesh.labels" (dict "root" . "name" .Values.PRIVATE_SERVICE_NAME ) | nindent 4 }}
spec:
  ports:
    - name: web
      protocol: TCP
      port: 8080
      targetPort: 8080
  selector:
    gateway.networking.k8s.io/gateway-name: '{{ .Values.ISTIO_PRIVATE_GATEWAY_NAME }}'
  clusterIP: None
  clusterIPs:
    - None
  type: ClusterIP
  sessionAffinity: None
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster
{{- end }}