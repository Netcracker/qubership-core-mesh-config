{{- if eq .Values.deploy_feature_flags.core.serviceMeshType "ISTIO" }}
---
kind: Service
apiVersion: v1
metadata:
  name: '{{ .Values.PUBLIC_FB_SERVICE_NAME }}'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "-80"
    helm.sh/hook-delete-policy: "before-hook-creation"        
  labels:
    {{- include "myapp.labels" (dict "root" . "name" .Values.PUBLIC_FB_SERVICE_NAME "processedByOperator" false) | nindent 4 }}  
spec:
  ports:
    - name: web
      protocol: TCP
      port: 8080
      targetPort: 8080
  selector:
    name: '{{ .Values.PUBLIC_SERVICE }}'
  clusterIP: None
  clusterIPs:
    - None
  type: ClusterIP
  sessionAffinity: None
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster 
---
kind: Service
apiVersion: v1
metadata:
  name: '{{ .Values.PRIVATE_FB_SERVICE_NAME }}'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "-80"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    {{- include "myapp.labels" (dict "root" . "name" .Values.PRIVATE_FB_SERVICE_NAME "processedByOperator" false) | nindent 4 }}  
spec:
  ports:
    - name: web
      protocol: TCP
      port: 8080
      targetPort: 8080
  selector:
    name: '{{ .Values.PRIVATE_SERVICE }}'
  clusterIP: None
  clusterIPs:
    - None
  type: ClusterIP
  sessionAffinity: None
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster
{{- end }} 
