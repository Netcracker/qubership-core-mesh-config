{{- if eq .Values.deploy_feature_flags.core.serviceMeshType "ISTIO" }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: '{{ .Values.WAYPOINT_NAME }}'
  labels:
    app.kubernetes.io/name: '{{ .Values.WAYPOINT_NAME }}'
    app.kubernetes.io/instance: '{{ cat .Values.WAYPOINT_NAME "-" .Values.NAMESPACE | nospace | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/version: '{{ .Chart.version }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/processed-by-operator: 'istiod'
    istio.io/waypoint-for: service
spec:
  gatewayClassName: istio-waypoint
  listeners:
  - name: mesh
    port: 15008
    protocol: HBONE
{{- end }}