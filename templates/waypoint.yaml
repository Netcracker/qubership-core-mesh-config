{{- if eq .Values.SERVICE_MESH_TYPE "Istio" }}
{{ $waypointName := .Values.WAYPOINT_NAME | default "waypoint" }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $waypointName }}
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "-100"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    deployer.cleanup/allow: "true"
    {{- include "mesh.labels" (dict "root" . "name" $waypointName "processedByOperator" true) | nindent 4 }}
    istio.io/waypoint-for: service
  annotations:
    proxy.istio.io/config: |
      proxyHeaders:
        server:
          disabled: true
        envoyDebugHeaders:
          disabled: true
        metadataExchangeHeaders:
          mode: IN_MESH
        attemptCount:
          disabled: true
spec:
  gatewayClassName: istio-waypoint
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: {{ printf "%s-pod-options" $waypointName }}
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
---
{{ include "mesh.gateway.deploymentCustomizationMap" (dict
  "name" $waypointName
  "values" (dict
    "root" .
    "replicas" .Values.REPLICAS
    "cpuRequest" .Values.WAYPOINT_CPU_REQUEST
    "cpuLimit" .Values.WAYPOINT_CPU_LIMIT
    "memoryLimit" .Values.WAYPOINT_MEMORY_LIMIT
    "topologies" .Values.CLOUD_TOPOLOGIES
    "topologyKey" .Values.CLOUD_TOPOLOGY_KEY
  )
) }}
---
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: strip-xfp-waypoint
  labels:
    deployer.cleanup/allow: "true"
    {{- include "mesh.labels" (dict "root" . "name" $waypointName "processedByOperator" true) | nindent 4 }}
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ $waypointName }}
  configPatches:
  - applyTo: VIRTUAL_HOST
    patch:
      operation: MERGE
      value:
        request_headers_to_remove:
        - x-forwarded-proto
{{- end }}