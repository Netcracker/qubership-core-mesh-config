{{- if eq .Values.deploy_feature_flags.core.serviceMeshType "ISTIO" }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: '{{ .Values.ISTIO_PUBLIC_GATEWAY_NAME }}'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "-100"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    {{- include "myapp.labels" (dict "root" . "name" .Values.ISTIO_PUBLIC_GATEWAY_NAME "processedByOperator" true) | nindent 4 }}  
spec:
  gatewayClassName: istio
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: {{ printf "%s-pod-options" .Values.ISTIO_PUBLIC_GATEWAY_NAME }}
  listeners:
  - name: http
    port: 8080
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: '{{ .Values.ISTIO_PRIVATE_GATEWAY_NAME }}'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "-100"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    {{- include "myapp.labels" (dict "root" . "name" .Values.ISTIO_PRIVATE_GATEWAY_NAME "processedByOperator" true) | nindent 4 }}  
spec:
  gatewayClassName: istio
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: {{ printf "%s-pod-options" .Values.ISTIO_PRIVATE_GATEWAY_NAME }}
  listeners:
  - name: http
    port: 8080
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
{{- end }}