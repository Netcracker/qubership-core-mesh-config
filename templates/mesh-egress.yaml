{{- if eq .Values.deploy_feature_flags.core.serviceMeshType "ISTIO" }}
{{- if not .Values.SKIP_EGRESS_GATEWAY_CREATION }}
---
kind: Service
apiVersion: v1
metadata:
  name: '{{ .Values.EGRESS_FB_SERVICE_NAME }}'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "-80"
    helm.sh/hook-delete-policy: "before-hook-creation"    
  labels:
    app.kubernetes.io/name: '{{ .Values.EGRESS_FB_SERVICE_NAME }}'
    app.kubernetes.io/instance: '{{ cat .Values.EGRESS_FB_SERVICE_NAME "-" .Values.NAMESPACE | nospace | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/version: '{{ .Chart.version }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/managed-by: Helm
spec:
  ports:
    - name: web
      protocol: TCP
      port: 8080
      targetPort: 8080
  selector:
    name: '{{ .Values.EGRESS_GATEWAY_SERVICE }}'
  clusterIP: None
  clusterIPs:
    - None
  type: ClusterIP
  sessionAffinity: None
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster 
---
kind: Service
apiVersion: v1
metadata:
  name: '{{ .Values.EGRESS_GATEWAY_SERVICE_NAME }}'
  annotations:
    helm.sh/hook: "post-install, post-upgrade"
    helm.sh/hook-weight: "110"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    app.kubernetes.io/name: '{{ .Values.EGRESS_GATEWAY_SERVICE_NAME }}'
    app.kubernetes.io/instance: '{{ cat .Values.EGRESS_GATEWAY_SERVICE_NAME "-" .Values.NAMESPACE | nospace | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/version: '{{ .Chart.version }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/managed-by: Helm
spec:
  ports:
    - name: web
      protocol: TCP
      port: 8080
      targetPort: 8080
  selector:
    gateway.networking.k8s.io/gateway-name: 'ns-{{ .Values.ISTIO_EGRESS_GATEWAY_NAME }}'
  clusterIP: None
  clusterIPs:
    - None
  type: ClusterIP
  sessionAffinity: None
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster 
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ns-{{ .Values.ISTIO_EGRESS_GATEWAY_NAME }}
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "-100"
    helm.sh/hook-delete-policy: "before-hook-creation"
    networking.istio.io/service-type: ClusterIP
  labels:
    app.kubernetes.io/name: 'ns-{{ .Values.ISTIO_EGRESS_GATEWAY_NAME }}'
    app.kubernetes.io/instance: 'ns-{{ cat .Values.ISTIO_EGRESS_GATEWAY_NAME "-" .Values.NAMESPACE | nospace | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/version: '{{ .Chart.version }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/processed-by-operator: 'istiod'
spec:
  gatewayClassName: istio
  listeners:
  - name: tls
    protocol: TLS
    port: 443
    tls:
      mode: Passthrough
  - name: http
    port: 8080
    protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.ISTIO_EGRESS_GATEWAY_NAME }}-route'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "-60"
    helm.sh/hook-delete-policy: "before-hook-creation"
    helm.sh/readiness-success: |
      {.status.parents[*].conditions[?(@.type=="Accepted")].status} != "False" &&
      {.status.parents[*].conditions[?(@.type=="ResolvedRefs")].status} != "False"    
    helm.sh/readiness-failure: |
      {.status.parents[*].conditions[?(@.type=="Accepted")].status} == "False" ||
      {.status.parents[*].conditions[?(@.type=="ResolvedRefs")].status} == "False"
  labels:
    app.kubernetes.io/name: '{{ .Values.ISTIO_EGRESS_GATEWAY_NAME }}-route'
    app.kubernetes.io/instance: '{{ cat .Values.ISTIO_EGRESS_GATEWAY_NAME "-" .Values.NAMESPACE | nospace | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/version: '{{ .Chart.version }}'
    app.kubernetes.io/part-of: '{{ .Values.APPLICATION_NAME }}'
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/processed-by-operator: 'istiod'
spec:
  parentRefs:
  - name: ns-{{ .Values.ISTIO_EGRESS_GATEWAY_NAME }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: '{{ .Values.EGRESS_FB_SERVICE_NAME }}'
      port: 8080
{{- end }}
{{- end }}